<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUCA CHECK PRO - Grupo ASIMEX</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #0d52a1; /* Azul del login */
            --primary-dark: #092a54; /* Azul oscuro del login */
            --text-dark: #222222;
            --border: #e0e0e0;
            --excel-green: #107c41;
            --pdf-red: #a63b3c;
            --whatsapp-green: #25D366;
            --whatsapp-dark: #128C7E;
        }

        body, html {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: url('img/fachada.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: all 0.3s ease;
        }

        /* Capa oscura sobre la imagen de fondo */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(9, 42, 84, 0.7) 0%, rgba(9, 42, 84, 0.95) 100%);
            z-index: -1;
        }

        /* --- ESTILOS DEL ENCABEZADO --- */
        header {
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            padding: 15px 40px;
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 90px;
        }

        .header-left {
            flex: 1;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 120px;
            height: auto;
            border-radius: 8px;
        }

        .header-center {
            flex: 2;
            text-align: center;
        }

            .header-center h2 {
                margin: 0;
                font-family: 'Montserrat', sans-serif;
                color: var(--primary-dark);
                font-size: 1.6rem;
                font-weight: 800;
                letter-spacing: -0.5px;
            }

        .header-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            align-items: center;
        }

        .header-btn {
            background-color: transparent;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-danger {
            color: #d13438;
            border: 1px solid #d13438;
        }

            .btn-danger:hover {
                background-color: #d13438;
                color: white;
                box-shadow: 0 4px 10px rgba(209, 52, 56, 0.3);
            }

        .btn-primary {
            color: var(--primary);
            border: 1px solid var(--primary);
        }

            .btn-primary:hover {
                background-color: var(--primary);
                color: white;
                box-shadow: 0 4px 10px rgba(13, 82, 161, 0.3);
            }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-container {
            width: 96%;
            max-width: 100%;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            flex-grow: 1;
            transition: all 0.3s ease;
        }

        body.layout-split-active .main-container {
            width: 48% !important;
            margin-left: 2% !important;
            margin-right: 0 !important;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .controls-panel, .results-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .controls-panel {
            height: fit-content;
            position: sticky;
            top: 100px;
            transition: all 0.3s;
        }

        body.layout-split-active .controls-panel {
            position: relative;
            top: 0;
            padding: 15px;
        }

        body.layout-split-active .results-panel {
            padding: 15px;
        }

        .controls-panel label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--primary-dark);
            margin-bottom: 8px;
            display: block;
            margin-top: 15px;
        }

            .controls-panel label:first-child {
                margin-top: 0;
            }

        input[type="file"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
            background: white;
        }

            input[type="file"]:focus, textarea:focus {
                border-color: var(--primary);
                outline: none;
            }

        textarea {
            height: 120px;
            resize: vertical;
        }

        .prompts-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .preset-btn {
            background-color: #f3f2f1;
            color: var(--text-dark);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

            .preset-btn:hover {
                background-color: var(--primary);
                color: white;
                border-color: var(--primary);
                transform: translateX(5px);
            }

        #sendBtn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.3s, transform 0.1s;
        }

            #sendBtn:hover {
                background-color: var(--primary-dark);
                box-shadow: 0 5px 15px rgba(9, 42, 84, 0.4);
            }

            #sendBtn:active {
                transform: scale(0.98);
            }

        .results-panel {
            min-height: 600px;
            width: 100%;
            box-sizing: border-box;
        }

        .export-actions {
            text-align: right;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .btn-export {
            width: auto;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            border: none;
            margin-left: 10px;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

            .btn-export:hover {
                opacity: 0.9;
            }

        #exportBtn {
            background: var(--excel-green);
        }

        #exportPdfBtn {
            background: var(--pdf-red);
        }

        #result {
            line-height: 1.6;
            display: none;
        }

            #result table {
                width: 100%;
                border-collapse: collapse;
                margin: 20px 0;
                background: white;
                box-shadow: 0 2px 8px rgba(0,0,0,0.05);
                border-radius: 8px;
                overflow: hidden;
            }

            #result th {
                background: var(--primary-dark);
                color: white;
                padding: 12px 15px;
                text-align: left;
                font-weight: 600;
            }

            #result td {
                padding: 12px 15px;
                border-bottom: 1px solid var(--border);
            }

            #result tr:last-child td {
                border-bottom: none;
            }

            #result h1, #result h2, #result h3 {
                font-family: 'Montserrat', sans-serif;
                color: var(--primary-dark);
                margin-top: 25px;
            }

        .loader {
            display: none;
            text-align: center;
            padding: 50px;
            color: var(--primary);
            font-weight: 600;
            font-size: 1.2rem;
        }

            .loader i {
                font-size: 2rem;
                margin-bottom: 15px;
                animation: spin 1s linear infinite;
            }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* ==========================================================================
           PANEL DE ADUANAS CON DISEÑO ADUJUSTABLE
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

            .modal-overlay.active {
                opacity: 1;
                visibility: visible;
            }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 1200px;
            height: 82vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            transform: translateY(-20px);
            transition: all 0.3s cubic-bezier(0.1, 0.8, 0.25, 1);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-overlay.mode-fullscreen {
            background: rgba(0,0,0,1);
            backdrop-filter: none;
        }

            .modal-overlay.mode-fullscreen .modal-content {
                width: 100% !important;
                max-width: 100% !important;
                height: 100vh !important;
                border-radius: 0 !important;
            }

        .modal-overlay.mode-split {
            position: fixed;
            top: 90px;
            right: 0;
            left: auto;
            width: 50%;
            height: calc(100vh - 90px);
            background: transparent;
            backdrop-filter: none;
            box-shadow: -5px 0 25px rgba(0,0,0,0.15);
        }

            .modal-overlay.mode-split .modal-content {
                width: 100% !important;
                max-width: 100% !important;
                height: 100% !important;
                border-radius: 0 !important;
                border-left: 3px solid var(--primary);
            }

        .modal-header {
            background: var(--primary-dark);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .modal-header h3 {
                margin: 0;
                font-family: 'Montserrat', sans-serif;
                font-size: 1.05rem;
                display: flex;
                align-items: center;
                gap: 8px;
            }

        .layout-controls {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px;
            border-radius: 6px;
            margin-left: auto;
            margin-right: 20px;
        }

        .layout-btn {
            background: transparent;
            border: none;
            color: #b0c4de;
            padding: 5px 10px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

            .layout-btn:hover {
                color: white;
                background: rgba(255,255,255,0.1);
            }

            .layout-btn.active {
                color: white;
                background: var(--primary);
                box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            }

        .close-modal-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            transition: color 0.2s;
        }

            .close-modal-btn:hover {
                color: #ff4c4c;
            }

        .iframe-container {
            flex-grow: 1;
            width: 100%;
            background: #f4f4f4;
        }

            .iframe-container iframe {
                width: 100%;
                height: 100%;
                border: none;
            }

        /* --- MEDIA QUERIES --- */
        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .controls-panel {
                position: relative;
                top: 0;
            }

            .modal-overlay.mode-split {
                width: 100%;
                top: 0;
                height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <header>
        <div class="header-left">
            <img src="img/ASIMEX LOGO2.jpeg" alt="Logo Grupo ASIMEX" class="logo">

            <button id="btnAduanas" class="header-btn btn-primary" style="background-color: var(--primary); color: white;">
                <i class="fa-solid fa-building-columns"></i> InfoDM Aduanas
            </button>

            <button id="btnArancelIA" class="header-btn" style="background-color: #6a0dad; color: white; border: 1px solid #6a0dad;">
                <i class="fa-solid fa-robot"></i> Arancel IA
            </button>

            <button id="btnWhatsApp" class="header-btn" style="background-color: var(--whatsapp-green); color: white; border: 1px solid var(--whatsapp-green);">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </button>
        </div>

        <div class="header-center">
            <h2>Duca Check Pro V1.0</h2>
        </div>

        <div class="header-right">
            <button id="clearHistoryBtn" class="header-btn btn-danger"><i class="fa-solid fa-trash-can"></i> Limpiar</button>
            <button id="backAdminBtn" class="header-btn btn-primary" style="display: none;"><i class="fa-solid fa-gear"></i> Panel Admin</button>
            <button id="logoutBtn" class="header-btn btn-danger"><i class="fa-solid fa-right-from-bracket"></i> Salir</button>
        </div>
    </header>

    <div class="main-container">
        <div class="controls-panel">
            <label><i class="fa-solid fa-file-pdf"></i> DOCUMENTOS (PDF)</label>
            <input type="file" id="fileInput" accept=".pdf" multiple>

            <div class="prompts-container">
                <label><i class="fa-solid fa-keyboard"></i> INSTRUCCIÓN (Opcional)</label>
                <textarea id="questionInput" placeholder="Escribe tu propia instrucción aquí o selecciona una de abajo..."></textarea>
                <button id="sendBtn"><i class="fa-solid fa-microchip"></i> EJECUTAR ANÁLISIS</button>
            </div>

            <label><i class="fa-solid fa-bolt"></i> ACCIONES RÁPIDAS</label>
            <button class="preset-btn" data-prompt="NECESITO CUADRICULA EN EXCEL DE LAS FACTURAS,SEGUN EL ORDEN SIGUIENTE, CANTIDAD BULTOS,unidades de venta (el valor en numeros, no tomes en cuenta la columna que dice Medida), CODIGO DE ARTICULO, SOLO DESCRIPCION EN ESPAÑOL, PARTIDA ARANCELARIA A 9 DIGITOS NO PONER PUNTOS, peso total (solo el valor numerico), pais de origen (solo valor abreviado a 2 letras) y precio total (solo valor numerico) ORDENADA POR CELDAS">📊 Retaceo Importaciones</button>
            <button class="preset-btn" data-prompt="NECESITO CUADRICULA EN EXCEL DE LAS FACTURAS, SEGUN EL ORDEN SIGUIENTE, CANTIDAD BULTOS,unidades de venta (el valor en numeros, no tomes en cuenta la columna que dice Medida), CODIGO DE ARTICULO, SOLO DESCRIPCION EN ESPAÑOL, PARTIDA ARANCELARIA A 9 DIGITOS NO PONER PUNTOS, peso total (solo el valor numerico), precio total (solo valor numerico) y pais de origen (solo valor abreviado a 2 letras)EN LETRA MAYUSCUALAS ORDENADA EN UNA TABLA SEGUN COLUMNA Y FILA">📊 Retaceo Pricesmart</button>
            <button class="preset-btn" data-prompt="Haz un resumen ejecutivo de este documento, destacando únicamente las obligaciones, penalizaciones o puntos críticos.">📝 Resumen Ejecutivo</button>
            <button class="preset-btn" data-prompt="Revisa detalladamente este documento en busca de inconsistencias, firmas faltantes, o fechas incongruentes. Genera una tabla con las anomalías encontradas.">⚠️ Auditoría de Anomalías</button>
            <button class="preset-btn" data-prompt="Compara la información de este documento con el documento anterior. Haz una tabla listando qué datos coinciden y qué datos son diferentes.">⚖️ Comparar con Anterior</button>
            <button class="preset-btn" data-prompt="detectar todas las discrepancias q hay en la duca en base a los documentos revisar todas las casillas de la duca en base a los doc adjuntos">🔍 Deteccion de discrepacias DUCA</button>
            <button class="preset-btn" data-prompt="ignora las conversaciones anteriores y Actúa como un analista de datos. A partir del documento proporcionado, genera únicamente una tabla de 8 columnas los HAWB, CASILLERO,DESTINATARIO,DESCRIPCION,PESO EN KG,PESO EN LIBRA,QTY,DIRECCION, FLETE QUE ES EL KG DE CADA CASIILA ENTRE EL TOTAL DE KG que lo sacaras de el documento shipper POR EL PRECIO TOTAL que lo sacaras de el documento shipper, no me des resumen ni formula ni validaceion solo dame el excel">📊 Retaceo Courier</button>
            <button class="preset-btn" data-prompt="Validar el código SAC declarado en la DUCA. Revisar que el inciso arancelario aplicado coincida exactamente con la descripción técnica, naturaleza, composición y uso de la mercancía detallada en la factura comercial y documentos adjuntos.">📖 Validación SAC</button>
            <button class="preset-btn" data-prompt="Analizar la aplicación de Tratados Internacionales y preferencias arancelarias en la DUCA. Verificar la existencia y validez del certificado de origen adjunto, confirmar que cumpla con las reglas de origen del tratado invocado y validar que la exención de impuestos sea correcta.">🌍 Tratados Internacionales</button>
            <button class="preset-btn" data-prompt="Realizar verificación y clasificación de las mercancías. Analizar las características, marca, modelo y especificaciones en los documentos de soporte y confirmar si la clasificación aduanera declarada es la correcta o si existe riesgo de mala clasificación.">🏷️ Verificaciones y Clasificación</button>
            <button class="preset-btn" data-prompt="Realizar una comparación exhaustiva cruzando la información de todos los documentos adjuntos (Factura Comercial, Lista de Empaque, Carta de Porte/BL) contra la DUCA. Detectar cualquier inconsistencia en valores de transacción, pesos brutos y netos, cantidad de bultos, descripciones, fletes, seguros y datos de importador/exportador.">📄 Comparación de Documentos</button>
        </div>

        <div class="results-panel">
            <div class="export-actions">
                <button id="exportBtn" class="btn-export"><i class="fa-solid fa-file-excel"></i> Exportar a Excel</button>
                <button id="exportPdfBtn" class="btn-export"><i class="fa-solid fa-file-pdf"></i> Exportar a PDF</button>
            </div>

            <div id="loader" class="loader">
                <i class="fa-solid fa-circle-notch"></i><br>Procesando con IA...
            </div>
            <div id="result"></div>
        </div>
    </div>

    <div id="aduanasModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fa-solid fa-building-columns"></i> Consulta de Mercancías - DGA</h3>

                <div class="layout-controls">
                    <button class="layout-btn active" id="optCentrado" title="Diseño Flotante"><i class="fa-solid fa-window-restore"></i> Flotante</button>
                    <button class="layout-btn" id="optDividido" title="Dividir pantalla en dos"><i class="fa-solid fa-columns"></i> Vista Paralela (50/50)</button>
                    <button class="layout-btn" id="optCompleto" title="Pantalla Completa"><i class="fa-solid fa-expand"></i> Completa</button>
                </div>

                <button id="closeModalBtn" class="close-modal-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="iframe-container">
                <iframe id="modalIframe" src="" title="Herramienta Externa"></iframe>
            </div>
        </div>
    </div>

    <script>
        // Carga Segura: Todo el JavaScript se ejecuta SÓLO cuando el HTML ya cargó por completo
        document.addEventListener("DOMContentLoaded", () => {

            // Protección de acceso inicial
            if (!localStorage.getItem('jwtToken')) {
                window.location.href = '/login.html';
                return; // Detiene la ejecución si no hay token
            }

            // 1. OBTENCIÓN DE TODOS LOS ELEMENTOS DEL DOM
            const btnAduanas = document.getElementById('btnAduanas');
            const btnArancelIA = document.getElementById('btnArancelIA');
            const btnWhatsApp = document.getElementById('btnWhatsApp');

            const aduanasModal = document.getElementById('aduanasModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const modalTitle = document.getElementById('modalTitle');
            const modalIframe = document.getElementById('modalIframe');

            const optCentrado = document.getElementById('optCentrado');
            const optDividido = document.getElementById('optDividido');
            const optCompleto = document.getElementById('optCompleto');

            const sendBtn = document.getElementById('sendBtn');
            const resultDiv = document.getElementById('result');
            const loader = document.getElementById('loader');
            const logoutBtn = document.getElementById('logoutBtn');
            const clearBtn = document.getElementById('clearHistoryBtn');
            const backAdminBtn = document.getElementById('backAdminBtn');
            const exportExcelBtn = document.getElementById('exportBtn');
            const exportPdfBtn = document.getElementById('exportPdfBtn');
            const questionInput = document.getElementById('questionInput');
            const fileInput = document.getElementById('fileInput');
            const presetBtns = document.querySelectorAll('.preset-btn');

            // 2. CONFIGURACIÓN DEL PANEL DE ADMINISTRADOR
            if (localStorage.getItem('userRole') === 'Administrador' && backAdminBtn) {
                backAdminBtn.style.display = 'inline-block';
                backAdminBtn.addEventListener('click', () => {
                    window.location.href = '/admin-dashboard.html';
                });
            }

            // 3. LÓGICA DE BOTONES RÁPIDOS
            if (presetBtns) {
                presetBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (questionInput) {
                            questionInput.value = btn.getAttribute('data-prompt');
                            questionInput.style.transition = "box-shadow 0.3s";
                            questionInput.style.boxShadow = "0 0 8px rgba(13, 82, 161, 0.5)";
                            setTimeout(() => { questionInput.style.boxShadow = "none"; }, 500);
                        }
                    });
                });
            }

            // 4. LÓGICA DE HERRAMIENTAS EXTERNAS (IFRAMES DINÁMICOS)
            function limpiarDiseños() {
                if (aduanasModal) aduanasModal.classList.remove('mode-fullscreen', 'mode-split');
                document.body.classList.remove('layout-split-active');
                if (optCentrado) optCentrado.classList.remove('active');
                if (optDividido) optDividido.classList.remove('active');
                if (optCompleto) optCompleto.classList.remove('active');
            }

            function abrirHerramientaExterna(titulo, icono, url) {
                if (modalTitle) modalTitle.innerHTML = `<i class="${icono}"></i> ${titulo}`;
                if (modalIframe) modalIframe.src = url;
                if (aduanasModal) aduanasModal.classList.add('active');
            }

            if (btnAduanas) {
                btnAduanas.addEventListener('click', () => {
                    abrirHerramientaExterna('Consulta de Mercancías - DGA', 'fa-solid fa-building-columns', 'https://aduana2.mh.gob.sv/VEA/free/InfoDm.do');
                });
            }

            if (btnArancelIA) {
                btnArancelIA.addEventListener('click', () => {
                    abrirHerramientaExterna('Búsqueda Arancel IA', 'fa-solid fa-robot', 'https://sitio.aduana.gob.sv/busqueda-arancel-asistida-por-inteligencia-artificial/');
                });
            }

            // 5. CONTROLADORES DEL MODAL Y VISTAS
            if (closeModalBtn) {
                closeModalBtn.addEventListener('click', () => {
                    if (aduanasModal) aduanasModal.classList.remove('active');
                    limpiarDiseños();
                    if (optCentrado) optCentrado.classList.add('active');
                    setTimeout(() => { if (modalIframe) modalIframe.src = ""; }, 300);
                });
            }

            if (optCentrado) {
                optCentrado.addEventListener('click', () => {
                    limpiarDiseños();
                    optCentrado.classList.add('active');
                });
            }

            if (optDividido) {
                optDividido.addEventListener('click', () => {
                    limpiarDiseños();
                    optDividido.classList.add('active');
                    if (aduanasModal) aduanasModal.classList.add('mode-split');
                    document.body.classList.add('layout-split-active');
                });
            }

            if (optCompleto) {
                optCompleto.addEventListener('click', () => {
                    limpiarDiseños();
                    optCompleto.classList.add('active');
                    if (aduanasModal) aduanasModal.classList.add('mode-fullscreen');
                });
            }

            if (aduanasModal) {
                aduanasModal.addEventListener('click', (e) => {
                    if (e.target === aduanasModal && !aduanasModal.classList.contains('mode-split') && !aduanasModal.classList.contains('mode-fullscreen')) {
                        aduanasModal.classList.remove('active');
                        setTimeout(() => { if (modalIframe) modalIframe.src = ""; }, 300);
                    }
                });
            }

            // 6. CONTROLADOR DE WHATSAPP (VENTANA POP-UP FLOTANTE)
            if (btnWhatsApp) {
                btnWhatsApp.addEventListener('click', () => {
                    // Configuramos el tamaño de la ventana
                    const width = 1000;
                    const height = 700;

                    // Calculamos para que aparezca centrada en la pantalla
                    const left = (screen.width / 2) - (width / 2);
                    const top = (screen.height / 2) - (height / 2);

                    // Abrimos WhatsApp como una ventana independiente y limpia
                    window.open(
                        'https://web.whatsapp.com',
                        'WhatsAppWeb',
                        `width=${width},height=${height},top=${top},left=${left},menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=yes`
                    );

                    // Cierra el modal central de herramientas si está abierto para no estorbar
                    if (aduanasModal && aduanasModal.classList.contains('active')) {
                        aduanasModal.classList.remove('active');
                        limpiarDiseños();
                        if (optCentrado) optCentrado.classList.add('active');
                        setTimeout(() => { if (modalIframe) modalIframe.src = ""; }, 300);
                    }
                });
            }

            // 7. LÓGICA DE PROCESAMIENTO (LA IA)
            if (sendBtn) {
                sendBtn.addEventListener('click', async () => {
                    const question = questionInput ? questionInput.value : "";
                    const token = localStorage.getItem('jwtToken');

                    if (!token) return window.location.href = '/login.html';

                    if (question.trim() === "") {
                        alert("Por favor, selecciona una acción rápida o escribe una instrucción.");
                        return;
                    }

                    const formData = new FormData();
                    const historialActual = localStorage.getItem('chatHistory') || "";
                    formData.append('History', historialActual);

                    if (fileInput && fileInput.files.length > 0) {
                        for (let i = 0; i < fileInput.files.length; i++) {
                            formData.append('Files', fileInput.files[i]);
                        }
                    }

                    const promptReforzado = question + "\n\n[INSTRUCCIÓN ESTRICTA DEL SISTEMA: Debes entregar los resultados solicitados SIEMPRE como una tabla en formato Markdown puro si se te pidió una tabla, o en texto estructurado. BAJO NINGUNA CIRCUNSTANCIA devuelvas formato JSON.]";
                    formData.append('Question', promptReforzado);

                    if (loader) loader.style.display = 'block';
                    if (resultDiv) resultDiv.style.display = 'none';

                    try {
                        const response = await fetch('/api/Document/upload-and-query', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}` },
                            body: formData
                        });

                        if (response.ok) {
                            const data = await response.json();
                            if (resultDiv && typeof marked !== 'undefined') {
                                resultDiv.innerHTML = marked.parse(data.answer);
                                resultDiv.style.display = 'block';
                            }
                            const nuevaEntrada = `Usuario: ${question}\nIA: ${data.answer}\n`;
                            localStorage.setItem('chatHistory', historialActual + nuevaEntrada);

                        } else if (response.status === 401) {
                            window.location.href = '/login.html';
                        } else {
                            const errorText = await response.text();
                            alert(`El servidor falló. Detalles del error:\n\n${errorText}`);
                        }
                    } catch (error) {
                        alert("Ocurrió un error en el navegador: " + error.message);
                        console.error(error);
                    } finally {
                        if (loader) loader.style.display = 'none';
                    }
                });
            }

            // 8. LÓGICA DE EXPORTACIÓN Y LIMPIEZA
            if (exportExcelBtn) {
                exportExcelBtn.addEventListener('click', () => {
                    if (typeof XLSX === 'undefined') {
                        alert("La librería de Excel no ha cargado correctamente. Intenta refrescar la página.");
                        return;
                    }
                    if (resultDiv) {
                        const tables = resultDiv.getElementsByTagName('table');
                        if (tables.length === 0) {
                            alert("La IA no generó ninguna tabla para exportar a Excel.");
                            return;
                        }
                        const wb = XLSX.utils.table_to_book(tables[0], { sheet: "Auditoria" });
                        XLSX.writeFile(wb, "Auditoria_LectorIA.xlsx");
                    }
                });
            }

            if (exportPdfBtn) {
                exportPdfBtn.addEventListener('click', () => {
                    if (typeof html2pdf === 'undefined') {
                        alert("La librería de PDF no ha cargado correctamente. Intenta refrescar la página.");
                        return;
                    }
                    if (!resultDiv || !resultDiv.innerHTML || resultDiv.style.display === 'none') {
                        alert("No hay resultados visibles para exportar a PDF.");
                        return;
                    }
                    const opt = {
                        margin: 10,
                        filename: 'Reporte_Auditoria.pdf',
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2 },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };
                    html2pdf().set(opt).from(resultDiv).save();
                });
            }

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    localStorage.removeItem('chatHistory');
                    alert("Se ha limpiado el historial de la conversación.");
                    if (resultDiv) {
                        resultDiv.innerHTML = "";
                        resultDiv.style.display = 'none';
                    }
                    if (questionInput) questionInput.value = "";
                });
            }

            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('jwtToken');
                    localStorage.removeItem('userRole');
                    localStorage.removeItem('chatHistory');
                    window.location.href = '/login.html';
                });
            }

        }); // Fin del bloque DOMContentLoaded
    </script>
</body>
</html>
